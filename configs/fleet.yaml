  dsn: ${env:FLEET_DATABASE_DSN}

serve:
  addr: ":8080"          # webhook listener (POST /webhooks/gitlab)
  workers: 4             # dispatcher worker pool
  rescan_interval: 30s   # pending-event redispatch period
