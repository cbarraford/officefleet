database:
  dsn: ${env:FLEET_DATABASE_DSN}

serve:
  addr: ":8080"          # webhook listener (POST /webhooks/gitlab)
  workers: 4             # dispatcher worker pool
  rescan_interval: 30s   # pending-event redispatch period

backends:
  - name: claude-default
    kind: claude
    auth:
      mode: subscription
    default_effort: high

# Example: api_key auth backend (use when subscription auth is not available)
#  - name: claude-apikey
#    kind: claude
#    auth:
#      mode: api_key
#      api_key: your-anthropic-api-key   # or reference an env var via env expansion
#    default_effort: high

# Example: openai-compatible endpoint backend (Ollama/vLLM/llama.cpp; SP2)
# Driven by OfficeFleet's generic agent loop. Requires base_uri + model.
#  - name: local-ollama
#    kind: openai-compatible
#    base_uri: http://localhost:11434/v1
#    model: llama3.1:70b
#    auth:
#      mode: none                  # or: mode: api_key  (add api_key: with an env ref)
#    default_effort: medium
#    params:
#      num_ctx: 8192               # passed through to the provider request
#    max_iterations: 25            # agent loop cap
#    command_timeout: 120s         # per run_command
#    max_output_bytes: 65536       # tool observation cap
#    command_allowlist: []         # empty = allow all commands

# Example: multi-model voter (SP2) — fans out to a panel, aggregates by strategy
#  - name: review-panel
#    kind: voter
#    strategy: first_success       # or: majority (plurality on status code)
#    panel: [claude-default, local-ollama]

agents:
  - name: dev-1
    role: developer
    enabled: true
    default_backend:
      name: claude-default
    system_prompt: |
      You are dev-1, a senior software engineer and code reviewer with deep expertise in
      Go, distributed systems, and security best practices.

      When reviewing merge requests you will:
      - Identify correctness bugs, race conditions, and error-handling gaps
      - Flag security vulnerabilities and unsafe patterns
      - Suggest simplifications that reduce cognitive load without sacrificing clarity
      - Keep all review comments terse and actionable — one concern per comment
      - Prioritise concurrency issues and proper resource cleanup above style nits

      You communicate in plain English. Avoid filler phrases such as "Great work!" or
      "Looks good to me." Get straight to the point.

duties:
  - name: mr-reviewer
    role: developer
    description: Review an open merge request and post structured feedback as a comment.
    trigger_kinds:
      - manual
      - cron
      - event-subscription
    required_tools:
      - glab
    prompt: |
      Review merge request !{{.Event.mr_iid}} in project {{.Assignment.project}}.

      You are acting as {{.Agent.name}}. Use the `glab` CLI to fetch the diff and any
      existing comments, then produce a concise review covering:

      1. Correctness — are there logic errors, unhandled errors, or data races?
      2. Security — injection risks, credential leakage, unsafe deserialization?
      3. Clarity — confusing variable names, missing context, over-engineering?

      Before reviewing, check the current MR head SHA. If it matches
      {{.State.last_reviewed_sha}}, respond with exactly: SKIP
      This prevents duplicate reviews when the MR has not changed.

      Output your review as Markdown suitable for a GitLab MR comment.
      End your response with a line: REVIEWED_SHA=<sha>
      where <sha> is the current head SHA of the MR, so the pipeline can store it.
    output_actions:
      - plugin: gitlab
        action: post_mr_comment

assignments:
  - agent: dev-1
    duty: mr-reviewer
    enabled: true
    trigger:
      kind: manual
    config:
      project: "myorg/myrepo"
    extra_instructions: "Focus on concurrency and error handling. Keep comments terse."
    outputs:
      - plugin: gitlab
        action: post_mr_comment
        params:
          project: "{{.Assignment.project}}"
          mr_iid: "{{.Event.mr_iid}}"
          body: "{{.Event.llm_summary}}"

  - agent: dev-1
    duty: mr-reviewer
    enabled: true
    trigger:
      kind: cron
      schedule: "0 9 * * 1-5"
    config:
      project: "myorg/myrepo"
    extra_instructions: "Review all open MRs needing attention. Focus on security and correctness."
    outputs:
      - plugin: gitlab
        action: post_mr_comment
        params:
          project: "{{.Assignment.project}}"
          mr_iid: "{{.Event.mr_iid}}"
          body: "{{.Event.llm_summary}}"

  - agent: dev-1
    duty: mr-reviewer
    enabled: true
    trigger:
      kind: event-subscription
      filter:
        source: gitlab
        event_type: mr_opened
        project: "myorg/myrepo"
    config:
      project: "myorg/myrepo"
    extra_instructions: "A new MR just opened; review it promptly. Keep comments terse."
    outputs:
      - plugin: gitlab
        action: post_mr_comment
        params:
          project: "{{.Assignment.project}}"
          mr_iid: "{{.Event.mr_iid}}"
          body: "{{.Event.llm_summary}}"

plugins:
  - name: gitlab
    config:
      base_url: "https://gitlab.com"
#      poll_interval: 60s
#      poll_projects: ["myorg/myrepo"]
